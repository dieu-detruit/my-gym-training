<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050816" />
    <title>ARM DAY</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">30 MIN · ARM HYPERTROPHY</p>
          <h1>ARM DAY</h1>
          <p class="subhead">Day A · 二頭 / 三頭</p>
        </div>
        <div class="progress-ring" aria-label="進捗">
          <span id="progress-count">0</span>
          <small>/12</small>
        </div>
      </header>

      <section class="dashboard">
        <div>
          <span class="metric-label">TODAY</span>
          <input id="date" class="date-input" type="date" />
        </div>
        <div>
          <span class="metric-label">VOLUME</span>
          <strong id="volume">0 kg</strong>
        </div>
        <button id="new-session" class="icon-button">RESET</button>
      </section>

      <div id="exercise-list" class="exercise-list"></div>

      <section class="footer-actions">
        <button id="copy-json" class="button ghost">COPY FOR CHATGPT</button>
        <button id="download-csv" class="button ghost">EXPORT CSV</button>
        <details class="sync-panel">
          <summary>GOOGLE SHEETS</summary>
          <label>
            <span>Apps Script WebアプリURL</span>
            <input id="endpoint" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
          </label>
          <p>一度設定すれば、各セットの「DONE」で自動送信します。</p>
        </details>
      </section>

      <p id="status" class="status">入力内容はこの端末に自動保存されます。</p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
