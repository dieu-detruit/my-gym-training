<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050816" />
    <title>ARM DAY</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">30 MIN · ARM HYPERTROPHY</p>
          <h1>ARM DAY</h1>
          <p class="subhead">Day A · 二頭 / 三頭</p>
        </div>
        <div class="progress-ring" aria-label="進捗">
          <span id="progress-count">0</span>
          <small>/12</small>
        </div>
      </header>

      <section class="dashboard">
        <div>
          <span class="metric-label">TODAY</span>
          <input id="date" class="date-input" type="date" />
        </div>
        <div>
          <span class="metric-label">VOLUME</span>
          <strong id="volume">0 kg</strong>
        </div>
        <button id="new-session" class="icon-button">RESET</button>
      </section>

      <div id="exercise-list" class="exercise-list"></div>

      <section class="finish-panel">
        <p class="finish-kicker">SESSION ARCHIVE</p>
        <h2>終わったら、そのままGitHubへ。</h2>
        <p>完了したセットを1つのJSONにまとめて保存します。次回からChatGPTが直接読めます。</p>
        <button id="save-github" class="button finish-button">WORKOUT COMPLETE →</button>
      </section>

      <section class="footer-actions">
        <details id="github-settings" class="sync-panel">
          <summary>GITHUB CONNECTION</summary>
          <label>
            <span>Fine-grained personal access token</span>
            <input id="github-token" type="password" autocomplete="off" placeholder="github_pat_..." />
          </label>
          <div class="settings-actions">
            <button id="save-token" class="button compact">SAVE TOKEN</button>
            <button id="clear-token" class="button compact danger">CLEAR</button>
          </div>
          <p>保存先: <code>dieu-detruit/my-gym-training</code>。必要権限はこのリポジトリの Contents: Read and write のみです。トークンはこの端末内だけに保存されます。</p>
        </details>
        <button id="copy-json" class="button ghost">COPY FOR CHATGPT</button>
        <button id="download-json" class="button ghost">DOWNLOAD JSON</button>
      </section>

      <p id="status" class="status">入力内容はこの端末に自動保存されます。</p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
